{% extends "base.html" %}

{% block title %}
Orders Dashboard
{% endblock %}

{% block extra_css %}

<style>
  body {
    background: #f1f5f9;
  }

  .card-gradient-1 {
    background: linear-gradient(135deg, #6366f1, #3b82f6);
    color: white;
  }
  .card-gradient-2 {
    background: linear-gradient(135deg, #10b981, #22c55e);
    color: white;
  }
  .card-gradient-3 {
    background: linear-gradient(135deg, #ef4444, #f97316);
    color: white;
  }

  .card {
    border-radius: 16px;
    border: none;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
  }

  .table thead {
    background: #6366f1;
    color: white;
  }
  .table tbody tr {
    background: white;
  }
  .table tbody tr:hover {
    background: #f1f5f9;
  }

  .badge-soft-success {
    background: #dcfce7;
    color: #166534;
  }
  .badge-soft-danger {
    background: #fee2e2;
    color: #991b1b;
  }
  .badge-soft-warning {
    background: #fef3c7;
    color: #92400e;
  }
</style>
{% endblock %} {% block content %}

<div class="container-fluid">
  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-dark">📊 Orders Dashboard</h2>
    <span class="badge bg-primary">Live</span>
  </div>

  <!-- SUMMARY -->
  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="card card-gradient-1 p-4">
        <h6>Total</h6>
        <h2 id="total"></h2>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card card-gradient-2 p-4">
        <h6>Placed</h6>
        <h2 id="placed"></h2>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card card-gradient-3 p-4">
        <h6>Ignored</h6>
        <h2 id="ignored"></h2>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="card p-3">
    <div class="table-responsive">
      <table class="table align-middle">
        <thead>
          <tr>
            <th>#</th>
            <th>Order ID</th>
            <th>Status</th>
            <th>Type</th>
            <th>Symbol</th>
            <th>Strike</th>
            <th>Price</th>
            <th>Alert</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="ordersTable"></tbody>
      </table>
    </div>

    <!-- PAGINATION -->
    <div class="d-flex justify-content-between mt-3">
      <button class="btn btn-outline-primary" onclick="prevPage()">Prev</button>
      <span id="pageInfo"></span>
      <button class="btn btn-outline-primary" onclick="nextPage()">Next</button>
    </div>
  </div>
</div>

{% endblock %} {% block extra_js %}
<script>
  let currentPage = 1;
  let limit = 10;
  let totalPages = 1;

  async function fetchOrders() {
    const res = await fetch(`/api/orders?page=${currentPage}&limit=${limit}`);
    const data = await res.json();

    const orders = data.data;
    const total = data.total;

    totalPages = Math.ceil(total / limit);

    // ✅ summary from backend
    document.getElementById("total").innerText = total;
    document.getElementById("placed").innerText = data.placed;
    document.getElementById("ignored").innerText = data.ignored;

    // table
    const tbody = document.getElementById("ordersTable");
    tbody.innerHTML = "";

    orders.forEach((o, i) => {
      // ✅ status badge MUST be inside loop
      let statusBadge = "";

      if (o.status === "PLACED") {
        statusBadge = '<span class="badge badge-soft-success">PLACED</span>';
      } else if (o.status === "IGNORED") {
        statusBadge = '<span class="badge badge-soft-warning">IGNORED</span>';
      } else {
        statusBadge = '<span class="badge badge-soft-danger">FAILED</span>';
      }

      const row = `
    <tr>
        <td>${(currentPage - 1) * limit + i + 1}</td>
        <td><span class="badge bg-secondary">${o.order_id}</span></td>
        <td>${statusBadge}</td>
        <td><span class="badge badge-soft-warning">${o.trade_type}</span></td>
        <td>${o.symbol}</td>
        <td>${o.strike}</td>
        <td class="text-primary fw-bold">${o.strike_price}</td>
        <td>${o.alert_price}</td>
        <td><small>${o.created_at}</small></td>
    </tr>
    `;

      tbody.innerHTML += row;
    });

    document.getElementById("pageInfo").innerText =
      `Page ${currentPage} / ${totalPages}`;
  }


  function nextPage() {
    if (currentPage < totalPages) {
      currentPage++;
      fetchOrders();
    }
  }

  function prevPage() {
    if (currentPage > 1) {
      currentPage--;
      fetchOrders();
    }
  }

  // 🔄 AUTO REFRESH
  setInterval(fetchOrders, 5000);

  // first load
  fetchOrders();
</script>
{% endblock %}
